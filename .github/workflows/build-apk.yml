name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Write android/local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "flutter.buildMode=release" >> android/local.properties
          echo "flutter.versionName=1.0.0" >> android/local.properties
          echo "flutter.versionCode=1" >> android/local.properties
          echo "sdk.dir=$ANDROID_HOME" >> android/local.properties

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Show resolved plugin versions
        run: |
          echo "=== pubspec.lock plugin versions ==="
          grep -A2 "video_player_android\|connectivity_plus\|shared_preferences_android\|path_provider_android\|package_info_plus" pubspec.lock || true
          echo "=== .flutter-plugins ==="
          cat .flutter-plugins 2>/dev/null || echo "not generated yet"
          echo "=== flutter-plugins-dependencies ==="
          cat .flutter-plugins-dependencies 2>/dev/null || echo "not generated yet"

      - name: Analyze Dart code
        run: flutter analyze --no-fatal-warnings || true

      - name: Build release APK verbose
        run: |
          flutter build apk \
            --release \
            --no-shrink \
            --build-name=1.0.0 \
            --build-number=${{ github.run_number }} \
            --verbose 2>&1 | tail -60

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/app-release.apk \
             artifacts/IPTV-Garden-v1.0.0.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: IPTV-Garden-APK
          path: artifacts/IPTV-Garden-v1.0.0.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-build-${{ github.run_number }}
          name: "IPTV Garden v1.0.0 (Build ${{ github.run_number }})"
          body: |
            ## IPTV Garden APK — Ready to Install

            ### How to Install
            1. Download **IPTV-Garden-v1.0.0.apk** below
            2. On your Android device, enable **Settings → Security → Install unknown apps**
            3. Open the downloaded APK and tap **Install**

            ### What's Included
            - 8,000+ free IPTV channels (iptv-org)
            - Video playback with full controls
            - EPG / programme guide
            - Favourites, recently watched, search
            - Chromecast support
            - Country and category filters
            - Dark theme
          files: artifacts/IPTV-Garden-v1.0.0.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
