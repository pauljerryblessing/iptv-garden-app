name: iptv_garden
description: A modern IPTV streaming app powered by IPTV Garden
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Video playback (media_kit - pure v2 embedding, no legacy issues)
  media_kit: ^1.1.11
  media_kit_video: ^1.2.4
  media_kit_libs_android_video: ^1.3.2

  # HTTP & networking
  http: ^1.2.1
  dio: ^5.4.3
  connectivity_plus: ^6.0.3

  # State management
  provider: ^6.1.2
  shared_preferences: ^2.3.2

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  animations: ^2.0.11

  # Utilities
  path_provider: ^2.1.3
  intl: ^0.19.0
  collection: ^1.18.0
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
